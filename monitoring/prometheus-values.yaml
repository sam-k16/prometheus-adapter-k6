# ============================================================
# kube-prometheus-stack
# GKE Observability Project
# ============================================================


# ------------------------------------------------------------
# Prometheus
# ------------------------------------------------------------

prometheus:
  enabled: true

  prometheusSpec:

    # Keep metrics for 7 days.
    retention: 7d

    # Prevent Prometheus from filling the entire 20Gi disk.
    retentionSize: "15GB"

    # --------------------------------------------------------
    # Discover ServiceMonitors across namespaces.
    #
    # Prometheus runs in: monitoring
    # Applications run in: order-app
    # --------------------------------------------------------

    serviceMonitorSelectorNilUsesHelmValues: false

    serviceMonitorSelector: {}

    serviceMonitorNamespaceSelector: {}

    # Allow PodMonitors later if required.

    podMonitorSelectorNilUsesHelmValues: false

    podMonitorSelector: {}

    podMonitorNamespaceSelector: {}

    # Allow our own PrometheusRule resources later.

    ruleSelectorNilUsesHelmValues: false

    ruleSelector: {}

    ruleNamespaceSelector: {}

    # --------------------------------------------------------
    # Prometheus resources
    # --------------------------------------------------------

    resources:
      requests:
        cpu: 250m
        memory: 512Mi

      limits:
        cpu: "1"
        memory: 2Gi

    # --------------------------------------------------------
    # Persistent storage
    # --------------------------------------------------------

    storageSpec:
      volumeClaimTemplate:
        spec:

          storageClassName: monitoring-retain

          accessModes:
            - ReadWriteOnce

          resources:
            requests:
              storage: 20Gi


# ------------------------------------------------------------
# Grafana
# ------------------------------------------------------------

grafana:
  enabled: true

  # Keep Grafana internal for now.
  # Access using kubectl port-forward.
  service:
    type: ClusterIP

  persistence:
    enabled: true

    type: pvc

    storageClassName: monitoring-retain

    accessModes:
      - ReadWriteOnce

    size: 5Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi

    limits:
      cpu: 500m
      memory: 512Mi


# ------------------------------------------------------------
# Alertmanager
# ------------------------------------------------------------

alertmanager:
  enabled: true

  alertmanagerSpec:

    resources:
      requests:
        cpu: 50m
        memory: 128Mi

      limits:
        cpu: 300m
        memory: 512Mi

    storage:
      volumeClaimTemplate:
        spec:

          storageClassName: monitoring-retain

          accessModes:
            - ReadWriteOnce

          resources:
            requests:
              storage: 2Gi


# ------------------------------------------------------------
# Prometheus Operator
# ------------------------------------------------------------

prometheusOperator:
  enabled: true

  resources:
    requests:
      cpu: 100m
      memory: 128Mi

    limits:
      cpu: 500m
      memory: 512Mi


# ------------------------------------------------------------
# kube-state-metrics
#
# Provides metrics about Kubernetes objects:
# Pods, Deployments, replicas, etc.
# ------------------------------------------------------------

kube-state-metrics:
  enabled: true


# ------------------------------------------------------------
# Provides node-level:
# CPU, memory, filesystem, network metrics.
# ------------------------------------------------------------

prometheus-node-exporter:
  enabled: true


# ------------------------------------------------------------
# GKE managed control-plane components
# ------------------------------------------------------------

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeEtcd:
  enabled: false

kubeProxy:
  enabled: false