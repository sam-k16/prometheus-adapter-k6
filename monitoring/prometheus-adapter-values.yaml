prometheus:
  url: http://kube-prometheus-stack-prometheus.monitoring.svc
  port: 9090

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

rules:
  default: false

  custom:

    # Order Service
    - seriesQuery: 'order_requests_total{namespace!="",pod!=""}'
      resources:
        overrides:
          namespace:
            resource: "namespace"
          pod:
            resource: "pod"

      name:
        matches: "^order_requests_total$"
        as: "order_requests_per_second"

      metricsQuery: 'sum(rate(<<.Series>>{<<.LabelMatchers>>,service="order-service",exported_endpoint="/orders",method="POST"}[1m])) by (<<.GroupBy>>)'

    # Inventory Service
    - seriesQuery: 'inventory_requests_total{namespace!="",pod!=""}'
      resources:
        overrides:
          namespace:
            resource: "namespace"
          pod:
            resource: "pod"

      name:
        matches: "^inventory_requests_total$"
        as: "inventory_requests_per_second"

      metricsQuery: 'sum(rate(<<.Series>>{<<.LabelMatchers>>,service="inventory-service",exported_endpoint="/inventory/reduce",method="PUT"}[1m])) by (<<.GroupBy>>)'

    # Notification Service
    - seriesQuery: 'notification_requests_total{namespace!="",pod!=""}'
      resources:
        overrides:
          namespace:
            resource: "namespace"
          pod:
            resource: "pod"

      name:
        matches: "^notification_requests_total$"
        as: "notification_requests_per_second"

      metricsQuery: 'sum(rate(<<.Series>>{<<.LabelMatchers>>,service="notification-service",exported_endpoint="/notify",method="POST"}[1m])) by (<<.GroupBy>>)'