prometheus:
  url: http://kube-prometheus-stack-prometheus.monitoring.svc
  port: 9090

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

rules:
  default: false

  custom:
    - seriesQuery: 'order_requests_total{namespace!="",pod!="",service="order-service",exported_endpoint="/orders",method="POST"}'

      resources:
        overrides:
          namespace:
            resource: "namespace"
          pod:
            resource: "pod"

      name:
        matches: "^order_requests_total$"
        as: "order_requests_per_second"

      metricsQuery: 'sum(rate(<<.Series>>{<<.LabelMatchers>>,service="order-service",exported_endpoint="/orders",method="POST"}[1m])) by (<<.GroupBy>>)'