tempo:
  reportingEnabled: false

server:
  http_listen_port: 3200

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal

# Accept traces from OpenTelemetry Collector
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

# Link traces back to logs via trace_id
# This enables "Logs for this span" button in Grafana
lokiSearch:
  enabled: true
  datasourceUid: "loki"

persistence:
  enabled: true
  size: 10Gi
