apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-load-test-script
  namespace: order-app
data:
  load-test.js: |
    import http from 'k6/http';
    import { check } from 'k6';

    export const options = {
      scenarios: {
        capacity_test: {
          executor: 'ramping-arrival-rate',

          startRate: 5,
          timeUnit: '1s',

          preAllocatedVUs: 50,
          maxVUs: 200,

          stages: [
            { target: 5, duration: '2m' },
            { target: 10, duration: '2m' },
            { target: 20, duration: '2m' },
            { target: 30, duration: '2m' },
            { target: 40, duration: '2m' },
            { target: 60, duration: '5m' },
          ],
        },
      },

      thresholds: {
        http_req_failed: ['rate<1.0'],
      },
    };

    export default function () {
      const response = http.post(
        'http://order-service.order-app.svc:8000/orders',
        JSON.stringify({
          product_id: 'PROD-001',
          quantity: 1,
          customer_id: 'k6-capacity-test',
        }),
        {
          headers: {
            'Content-Type': 'application/json',
          },
        }
      );

      check(response, {
        'status is 200': (r) => r.status === 200,
      });
    }

---
apiVersion: batch/v1
kind: Job
metadata:
  name: order-service-load-test
  namespace: order-app
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never

      containers:
        - name: k6
          image: grafana/k6:latest
          args:
            - run
            - /scripts/load-test.js

          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          volumeMounts:
            - name: script
              mountPath: /scripts

      volumes:
        - name: script
          configMap:
            name: order-service-load-test-script