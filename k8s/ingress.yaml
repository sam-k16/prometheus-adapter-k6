apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: observeall-ingress
  namespace: observe-app
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # Order Service
          - path: /orders
            pathType: Prefix
            backend:
              service:
                name: order-service
                port:
                  number: 8000

          # Inventory Service
          - path: /inventory
            pathType: Prefix
            backend:
              service:
                name: inventory-service
                port:
                  number: 8001

          # Notification Service
          - path: /notifications
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  number: 8002

          - path: /notify
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  number: 8002

          # Health checks
          - path: /health/orders
            pathType: Prefix
            backend:
              service:
                name: order-service
                port:
                  number: 8000

          - path: /health/inventory
            pathType: Prefix
            backend:
              service:
                name: inventory-service
                port:
                  number: 8001

          - path: /health/notifications
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  number: 8002
