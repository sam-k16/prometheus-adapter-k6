# ── Namespace ─────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: observe-app

---
# ── Order Service ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: observe-app
  labels:
    app: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: order-service
          image: gcr.io/iconic-being-499605-m3/order-service:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: observe-app
  labels:
    app: order-service
spec:
  selector:
    app: order-service
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP

---
# ── Inventory Service ─────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: observe-app
  labels:
    app: inventory-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: inventory-service
          image: gcr.io/iconic-being-499605-m3/inventory-service:latest
          ports:
            - containerPort: 8001
          env:
            - name: PORT
              value: "8001"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: observe-app
  labels:
    app: inventory-service
spec:
  selector:
    app: inventory-service
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP

---
# ── Notification Service ──────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: observe-app
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8002"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: notification-service
          image: gcr.io/iconic-being-499605-m3/notification-service:latest
          ports:
            - containerPort: 8002
          env:
            - name: PORT
              value: "8002"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: observe-app
  labels:
    app: notification-service
spec:
  selector:
    app: notification-service
  ports:
    - port: 8002
      targetPort: 8002
  type: ClusterIP
