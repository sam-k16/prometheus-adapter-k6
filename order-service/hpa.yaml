apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-service
  namespace: order-app

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-service

  minReplicas: 1
  maxReplicas: 5

  metrics:
    - type: Pods
      pods:
        metric:
          name: order_requests_per_second
        target:
          type: AverageValue
          # Temporary threshold; final value determined with k6.
          averageValue: "1"